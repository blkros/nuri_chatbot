<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuri Chatbot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- 초기 화면: Google 스타일 중앙 검색 -->
    <div id="landing" class="landing">
      <h1 class="logo">Nuri Chatbot</h1>
      <p class="subtitle">사내 문서 기반 AI 어시스턴트</p>
      <div class="search-box">
        <button id="attach-btn" class="attach-btn" title="파일 첨부">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <input type="text" id="query-input" placeholder="무엇이든 물어보세요..." autocomplete="off">
        <button id="search-btn" class="search-btn" title="전송">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="chip-row" id="landing-chips">
        <button class="chip active" data-dept="">전체</button>
        <button class="chip" data-dept="인사">인사</button>
        <button class="chip" data-dept="개발">개발</button>
        <button class="chip" data-dept="영업">영업</button>
        <button class="chip" data-dept="경영">경영</button>
        <button class="chip" data-dept="재무">재무</button>
        <button class="chip" data-dept="기타">기타</button>
      </div>
      <div id="file-badge" class="file-badge hidden">
        <span id="file-name"></span>
        <button id="file-remove" class="file-remove" title="제거">&times;</button>
      </div>
    </div>

    <!-- 대화 영역 -->
    <div id="chat-area" class="chat-area">
      <!-- 상단 바 -->
      <div class="top-bar">
        <span class="top-logo" onclick="resetUI()">Nuri Chatbot</span>
      </div>

      <!-- 대화 메시지 영역 -->
      <div id="chat-messages" class="chat-messages"></div>

      <!-- 하단 입력창 -->
      <div class="bottom-bar">
        <div class="bottom-input-box">
          <button id="bottom-attach-btn" class="attach-btn attach-btn-sm" title="파일 첨부">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <input type="text" id="bottom-query-input" placeholder="후속 질문을 입력하세요..." autocomplete="off">
          <button id="bottom-send-btn" class="search-btn search-btn-sm" title="전송">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
        <div class="chip-row chip-row-bottom" id="bottom-chips">
          <button class="chip active" data-dept="">전체</button>
          <button class="chip" data-dept="인사">인사</button>
          <button class="chip" data-dept="개발">개발</button>
          <button class="chip" data-dept="영업">영업</button>
          <button class="chip" data-dept="경영">경영</button>
          <button class="chip" data-dept="재무">재무</button>
          <button class="chip" data-dept="기타">기타</button>
        </div>
        <div id="bottom-file-badge" class="file-badge file-badge-bottom hidden">
          <span id="bottom-file-name"></span>
          <button id="bottom-file-remove" class="file-remove" title="제거">&times;</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" hidden>
  <div id="toast-container" class="toast-container"></div>
  <script src="/static/script.js"></script>
</body>
</html>

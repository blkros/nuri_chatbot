<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuri Chatbot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- 초기 화면: Google 스타일 중앙 검색 -->
    <div id="landing" class="landing">
      <h1 class="logo">Nuri Chatbot</h1>
      <p class="subtitle">사내 문서 기반 AI 어시스턴트</p>
      <div class="search-box">
        <input type="text" id="query-input" placeholder="무엇이든 물어보세요..." autocomplete="off">
        <button id="search-btn" class="search-btn" title="검색">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 답변 영역 -->
    <div id="result-area" class="result-area hidden">
      <!-- 상단 검색바 (답변 후) -->
      <div class="top-bar">
        <span class="top-logo" onclick="resetUI()">Nuri Chatbot</span>
        <div class="top-search-box">
          <input type="text" id="top-query-input" placeholder="무엇이든 물어보세요..." autocomplete="off">
          <button id="top-search-btn" class="search-btn" title="검색">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="answer-container">
        <div id="loading" class="loading hidden">
          <div class="spinner"></div>
          <span>문서를 검색하고 답변을 생성하고 있습니다...</span>
        </div>
        <div id="answer-box" class="answer-box hidden">
          <div id="answer-text" class="answer-text"></div>
          <div id="sources" class="sources"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
